<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account Tracker</title>
<style>
  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --ink: #1E2422;
    --ink-soft: #5B645F;
    --line: #DEDAD0;
    --red: #C0392B;
    --red-deep: #8E2A1F;
    --green: #2F6B4F;
    --amber: #B8781E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 0 0 4rem;
  }
  header {
    background: var(--red);
    color: #fff;
    padding: 1.75rem 1.5rem 1.5rem;
    border-bottom: 6px solid var(--red-deep);
  }
  header h1 {
    margin: 0;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  header p {
    margin: 0.35rem 0 0;
    color: rgba(255,255,255,0.85);
    font-size: 0.9rem;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  .notice {
    background: #FDF3E7;
    border: 1px solid #EAD3AE;
    color: var(--amber);
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1.5rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .card h2 {
    margin: 0 0 1rem;
    font-size: 1rem;
    font-weight: 600;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin-bottom: 0.3rem;
  }
  input, select {
    width: 100%;
    padding: 0.55rem 0.65rem;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 0.95rem;
    background: #fff;
    color: var(--ink);
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--red);
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .btn-primary {
    background: var(--red);
    color: #fff;
    padding: 0.65rem 1.25rem;
    margin-top: 1rem;
  }
  .btn-primary:hover { background: var(--red-deep); }
  .accounts-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .account-row {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: start;
  }
  .account-row .name {
    font-weight: 600;
    font-size: 1rem;
  }
  .account-row .meta {
    color: var(--ink-soft);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }
  .account-row .shinies {
    margin-top: 0.4rem;
    font-size: 0.85rem;
  }
  .tag {
    display: inline-block;
    background: #EFEAE0;
    color: var(--ink-soft);
    border-radius: 4px;
    padding: 0.1rem 0.5rem;
    font-size: 0.75rem;
    margin-right: 0.3rem;
    margin-top: 0.25rem;
  }
  .row-actions { display: flex; gap: 0.4rem; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    color: var(--ink-soft);
  }
  .icon-btn:hover { border-color: var(--red); color: var(--red); }
  .empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
    padding: 2rem 0;
  }
</style>
</head>
<body>

<header>
  <h1>Account tracker</h1>
  <p>Keep track of your Pokemon Go accounts, passes, and shiny wishlist.</p>
</header>

<main>
  <div class="notice">
    Data saves only in this browser, on this device. It is not sent anywhere. Do not store real passwords here — use a password manager for those.
  </div>

  <div class="card">
    <h2>Add an account</h2>
    <div class="form-grid">
      <div>
        <label for="in-name">Nickname</label>
        <input id="in-name" placeholder="e.g. Main, Alt 1" />
      </div>
      <div>
        <label for="in-type">Login type</label>
        <select id="in-type">
          <option>Google</option>
          <option>PTC</option>
          <option>Facebook</option>
          <option>Apple</option>
        </select>
      </div>
      <div>
        <label for="in-passes">Passes</label>
        <input id="in-passes" type="number" min="0" step="1" value="0" />
      </div>
      <div class="full">
        <label for="in-shinies">Shinies needed (comma separated)</label>
        <input id="in-shinies" placeholder="e.g. Shiny Rayquaza, Shiny Larvitar" />
      </div>
    </div>
    <button class="btn-primary" id="add-btn">Add account</button>
  </div>

  <div class="card">
    <h2>Your accounts</h2>
    <div class="accounts-list" id="list"></div>
  </div>
</main>

<script>
const STORAGE_KEY = "pogo_accounts_v1";

function loadAccounts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveAccounts(accounts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
}

function render() {
  const accounts = loadAccounts();
  const list = document.getElementById("list");

  if (accounts.length === 0) {
    list.innerHTML = '<p class="empty">No accounts yet. Add your first one above.</p>';
    return;
  }

  list.innerHTML = accounts.map((a, i) => {
    const shinyTags = (a.shinies || "")
      .split(",")
      .map(s => s.trim())
      .filter(Boolean)
      .map(s => `<span class="tag">${escapeHtml(s)}</span>`)
      .join("");

    return `
      <div class="account-row">
        <div>
          <div class="name">${escapeHtml(a.name)}</div>
          <div class="meta">${escapeHtml(a.type)} &middot; ${a.passes} passes</div>
          <div class="shinies">${shinyTags || '<span style="color:var(--ink-soft)">No shinies listed</span>'}</div>
        </div>
        <div class="row-actions">
          <button class="icon-btn" data-action="edit" data-i="${i}">Edit</button>
          <button class="icon-btn" data-action="delete" data-i="${i}">Delete</button>
        </div>
      </div>
    `;
  }).join("");

  list.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const accounts = loadAccounts();
      accounts.splice(Number(btn.dataset.i), 1);
      saveAccounts(accounts);
      render();
    });
  });

  list.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const accounts = loadAccounts();
      const a = accounts[Number(btn.dataset.i)];
      document.getElementById("in-name").value = a.name;
      document.getElementById("in-type").value = a.type;
      document.getElementById("in-passes").value = a.passes;
      document.getElementById("in-shinies").value = a.shinies;
      accounts.splice(Number(btn.dataset.i), 1);
      saveAccounts(accounts);
      render();
      document.getElementById("in-name").focus();
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById("add-btn").addEventListener("click", () => {
  const name = document.getElementById("in-name").value.trim();
  const type = document.getElementById("in-type").value;
  const passes = parseInt(document.getElementById("in-passes").value, 10) || 0;
  const shinies = document.getElementById("in-shinies").value.trim();

  if (!name) {
    document.getElementById("in-name").focus();
    return;
  }

  const accounts = loadAccounts();
  accounts.push({ name, type, passes, shinies });
  saveAccounts(accounts);

  document.getElementById("in-name").value = "";
  document.getElementById("in-passes").value = "0";
  document.getElementById("in-shinies").value = "";
  render();
});

render();
</script>

</body>
</html>
